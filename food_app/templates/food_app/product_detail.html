{% extends "food_app/base.html" %}
{% load static %}

{% block title %}{{ product.name }}{% endblock %}
{% block content %}

<div class="row">
  <div class="col-md-6">
    <img src="{{ product.image.url }}" class="img-fluid rounded shadow-sm">
  </div>

  <div class="col-md-6">
    <h2>{{ product.name }}</h2>
    <p class="text-muted">₹ {{ product.price }}</p>

    <form class="add-to-cart-form" data-product-id="{{ product.id }}" method="post" action="{% url 'add_to_cart' product.id %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-primary add-to-cart-btn" data-product-id="{{ product.id }}">Add to Cart</button>
    </form>

    <a href="{% url 'product_list' %}" class="btn btn-outline-secondary mt-3">Back to Menu</a>
  </div>
</div>

{% endblock %}
